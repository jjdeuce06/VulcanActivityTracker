!DOCTYPE html>
<html>
<head>
    <title>Vulcan Activity Tracker</title>
    <link rel="stylesheet" href="style/css/loginstyle.css">
</head>

<body>
    <main class="page">
        <div class="login-card">

            <img src="{{ url_for('style_folder.static', filename='img/vulcan.png') }}"
                alt="Vulcan Logo"
                class="profile-img">
                <label><h2>Reset Password</h2></label>

            <div class="login-form">
                <input type="text" placeholder="Enter Email" id="user_entry" required>

    
                <button class="resetPassword" onclick="resetPassword()">Reset Password</button>
                <button class="cancelbtn" onclick="backToLogin()">Cancel</button>
            </div>


        </div>
    </main>

    <footer>
        <p>&copy; 2025 The Vulcan Activity Tracker.</p>
    </footer>

    <script src = "{{ url_for('style_folder.static', filename='js/resetPassword.js') }}"></script>

</body>
</html>
