{% extends "base_temp/dashboard.html" %}

{% block content %}
<style>
  h1 {
    text-align: center;
    font-weight: 800;
    margin-bottom: 25px;
    color: #0b1170;
  }

  #sortByGender {
    display: block;
    margin: 0 auto 30px auto;
    padding: 10px 16px;
    font-size: 14px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(145deg, #0b1170, #070b3f);
    color: white;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  }

  #sortByGender option {
  background-color: #070b3f;
  color: white;
}

  #teams-container {
    width: 80%;
    max-width: 900px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
  }

  .team {
    background: #070b3f;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 6px 16px rgba(0,0,0,0.35);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .team:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 22px rgba(0,0,0,0.4);
  }

  .team h3 {
    margin-bottom: 12px;
    font-size: 18px;
    color: white;
  }

  .team a {
    display: inline-block;
    padding: 8px 14px;
    border-radius: 6px;
    background: linear-gradient(145deg, #0b1170, #6b1414);
    color: white;
    text-decoration: none;
    font-size: 13px;
    transition: background 0.2s ease;
  }

  .team a:hover {
    background: linear-gradient(145deg, #1018a0, #8b1a1a);
  }
</style>

<h1>Official Teams</h1>

<select id="sortByGender">
  <option value="men" selected>Men's Sports</option>
  <option value="women">Women's Sports</option>
</select>

<div id="teams-container"></div>

<script src="{{ url_for('style_folder.static', filename='js/teams.js') }}"></script>
{% endblock %}
