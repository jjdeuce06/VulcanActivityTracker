{% extends "base_temp/dashboard.html" %}

{% block page_css %}
<link rel="stylesheet" href="{{ url_for('style_folder.static', filename='css/clubs.css') }}">
{% endblock %}

{% block content %}
<div class="clubpage-page">

  <div class="clubpage-top-section">
    <div class="clubpage-header-card">
      <h1>Clubs</h1>
      <p class="clubpage-description">
        Join clubs, track group activity, and stay motivated together.
      </p>
    </div>

    <a href="/create_club" class="clubpage-create-btn">
      + Create Club
    </a>
  </div>

  <div class="clubpage-layout">

    <div class="clubpage-card">
      <h3>My Clubs</h3>
      <div class="clubpage-list" id="my-clubs-list">
        <!-- JS will inject clubs here -->
      </div>
    </div>

    <div class="clubpage-card">
      <h3>All Clubs</h3>
      <div class="clubpage-list" id="all-clubs-list">
        <!-- JS will inject clubs here -->
      </div>
    </div>

  </div>
</div>

<script src="{{ url_for('style_folder.static', filename='js/clubs.js') }}"></script>
{% endblock %}
