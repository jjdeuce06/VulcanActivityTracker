 <!-- challenges.html: -->
 {% extends "base_temp/dashboard.html" %}

{% block page_css %}
<link rel="stylesheet" href="{{ url_for('style_folder.static', filename='css/challenges.css') }}">
{% endblock %}

{% block content %}
<div class ="challengepage-page">
    
<div class="challengepage-top-section">
  <div class="challengepage-header-card">
    <h1>Challenges</h1>
    <p class="challengepage-description">
      Compete with others and push your limits.
    </p>
  </div>

  <a href="/create_challenge" class="challengepage-create-btn">
    + Create Challenge
  </a>
</div>

<div class="challenge-medals-title-card">
  <h3>Your Medals</h3>
</div>

<div class="challenge-medal-summary" id="challenge-medal-summary">
  <div class="challenge-medal-pill">🥇 Gold: <span id="gold-medal-count">0</span></div>
  <div class="challenge-medal-pill">🥈 Silver: <span id="silver-medal-count">0</span></div>
  <div class="challenge-medal-pill">🥉 Bronze: <span id="bronze-medal-count">0</span></div>
  <div class="challenge-medal-pill">✅ Completed Challenges: <span id="completed-count">0</span></div>
</div>



    <div class="challengepage-layout">

    
        <!-- RIGHT: MY CHALLENGES -->
        <div class="challengepage-card">
            <h3>My Challenges</h3>
            <div class="challengepage-list" id="my-challenge-list">
                <!-- JS will inject challenges here -->
            </div>
        </div>

        <!-- RIGHT: ACTIVE CHALLENGES -->
        <div class="challengepage-card">
            <h3>All Challenges</h3>
            <div class="challengepage-list" id="all-challenge-list">
                <!-- JS will inject challenges here -->
            </div>
        </div>
    </div>
</div>

</body>
<script src="{{ url_for('style_folder.static', filename='js/challenges.js') }}"></script>

{% endblock %}
